<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bone Thief - Bộ 10 Dog</title>
    <style>
      :root {
        --ink: #13251c;
        --cream: #fff5d2;
        --gold: #f3d77f;
        --panel: rgba(255, 248, 220, 0.95);
        --border: rgba(244, 216, 139, 0.38);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 28px;
        background:
          radial-gradient(circle at 16% 12%, rgba(255, 241, 178, 0.22) 0 1px, transparent 2px),
          radial-gradient(circle at 84% 18%, rgba(255, 241, 178, 0.2) 0 1px, transparent 2px),
          linear-gradient(180deg, #143d2f 0%, #0b251c 54%, #071a14 100%);
        color: var(--cream);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 22px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 16px;
      }

      p {
        margin: 0;
        color: rgba(255, 245, 210, 0.8);
        line-height: 1.5;
      }

      h1 {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(2rem, 7vw, 4.4rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .badge {
        border: 1px solid rgba(244, 216, 139, 0.45);
        border-radius: 999px;
        padding: 9px 14px;
        color: var(--gold);
        font-weight: 800;
        white-space: nowrap;
      }

      .dog-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 16px;
      }

      .dog-card {
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        color: var(--ink);
        box-shadow: 0 18px 36px rgba(0, 0, 0, 0.26);
      }

      .dog-card img {
        display: block;
        width: 100%;
        aspect-ratio: 2 / 3;
        object-fit: cover;
        background: #d8dfd1;
      }

      .dog-card figcaption {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 11px 12px 12px;
        font-weight: 900;
      }

      .dog-card span {
        color: #65715f;
        font-size: 0.8rem;
        font-weight: 800;
      }

      @media (max-width: 680px) {
        body {
          padding: 18px;
        }

        header {
          align-items: start;
          flex-direction: column;
        }

        .dog-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <p>Bộ ảnh tham khảo cho giao diện hướng dẫn</p>
          <h1>10 Dog Cards</h1>
        </div>
        <div class="badge">Bone Thief</div>
      </header>

      <section class="dog-grid" aria-label="Bộ 10 ảnh Dog">
        <figure class="dog-card">
          <img src="/bone-thief.png" alt="Chó Trộm Xương" />
          <figcaption>Chó Trộm Xương <span>01</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/white-dog.png" alt="White Dog" />
          <figcaption>White Dog <span>02</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/yard-dog-1.png" alt="Yard Dog 1" />
          <figcaption>Yard Dog <span>03</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/yard-dog-2.png" alt="Yard Dog 2" />
          <figcaption>Yard Dog <span>04</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/yard-dog-3.png" alt="Yard Dog 3" />
          <figcaption>Yard Dog <span>05</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/yard-dog-4.png" alt="Yard Dog 4" />
          <figcaption>Yard Dog <span>06</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/yard-dog-5.png" alt="Yard Dog 5" />
          <figcaption>Yard Dog <span>07</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/yard-dog-6.png" alt="Yard Dog 6" />
          <figcaption>Yard Dog <span>08</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/yard-dog-7.png" alt="Yard Dog 7" />
          <figcaption>Yard Dog <span>09</span></figcaption>
        </figure>
        <figure class="dog-card">
          <img src="/yard-dog-8.png" alt="Yard Dog 8" />
          <figcaption>Yard Dog <span>10</span></figcaption>
        </figure>
      </section>
    </main>
  </body>
</html>
